<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>主選單 - 綜合管理系統</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container" id="menuBox">
    <div class="user-info-bar">
      <span><span class="dept-badge" id="menuDept"></span> <span id="menuUser" style="font-weight:bold;"></span> 您好</span>
      <button class="btn-outline" onclick="logout()">登出</button>
    </div>
    <div class="header-title"><div class="sub-title">請選擇功能</div></div>
    
    <div class="menu-grid">
      <div class="menu-card" onclick="window.location.href='sign.html'">
        <span class="menu-icon">📝</span>
        <div class="menu-text">數位會簽本</div>
      </div>
      <div class="menu-card" onclick="window.location.href='duty.html'">
        <span class="menu-icon">📅</span>
        <div class="menu-text">數位值日簿</div>
      </div>
      <div class="menu-card" id="menuBtnDashboard" onclick="window.location.href='dashboard.html'">
        <span class="menu-icon">📊</span>
        <div class="menu-text">檢查量儀錶板</div>
      </div>
      <div class="menu-card" onclick="window.location.href='camera.html'">
        <span class="menu-icon">📸</span>
        <div class="menu-text">GPS相機</div>
      </div>
    </div>
  </div>
  

  <script src="js/api.js"></script>
  <script src="js/menu.js"></script>
</body>
</html>
