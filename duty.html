<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>數位值日簿 - 綜合管理系統</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container" id="dutySystemBox">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
      <button class="btn-secondary" onclick="window.location.href='menu.html'">⬅ 返回選單</button>
      <h3 style="margin:0;">數位值日簿</h3>
    </div>

    <div class="duty-section">
      <div class="section-title">值日輪值表</div>
      <div class="calendar-controls">
        <button class="btn-outline" onclick="changeMonth(-1)">◀ 上個月</button>
        <span id="calTitle" style="font-weight:bold; font-size:1.2em;"></span>
        <button class="btn-outline" onclick="changeMonth(1)">下個月 ▶</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <div style="text-align:center; font-size:0.8em; color:#666; margin-top:10px;">
        圖例：<span style="color:#2e7d32; font-weight:bold;">🟩已完成</span> / <span style="color:#c62828; font-weight:bold;">🟥未填寫(缺)</span> / <span style="color:#1976d2; font-weight:bold;">🟦未來值班</span>
      </div>
    </div>

    <div class="duty-section">
      <div class="section-title">代理人設定</div>
      <div style="display:flex; align-items:center; gap:15px; flex-wrap:wrap;">
        <div style="flex:1;">
          <label style="font-size:0.9em; color:#666;">選擇需代理日期：</label>
          <input type="date" id="proxyDate" style="margin-bottom:0;">
        </div>
        <div style="flex:2; display:flex; align-items:center; justify-content:space-between; background:#f8f9fa; padding:10px; border-radius:8px; border:1px solid #ddd;">
          <div>
            <span style="font-size:0.9em; color:#666;">代理人：</span>
            <span id="proxyDisplayInfo" class="proxy-info"></span>
          </div>
          <button class="btn-primary" onclick="submitProxy()" style="width:auto; padding:8px 15px; margin:0;">設定我為代理人</button>
        </div>
      </div>
    </div>

    <div class="duty-section">
      <div class="section-title">
        值日日誌填寫
        <div class="log-controls">
          <button class="btn-outline" onclick="changeLogDate(-1)">◀</button>
          <input type="date" id="logDate" onchange="loadLogData()" style="width:auto; margin:0;">
          <button class="btn-outline" onclick="changeLogDate(1)">▶</button>
        </div>
      </div>
      
      <div id="logOverlay" style="text-align:center; padding:20px; color:#d93025; font-weight:bold;" class="hidden"></div>

      <div id="logForm">
        <label style="font-weight:bold;">當日辦理事項：</label>
        <textarea id="logTask1" rows="5"></textarea>
        
        <label style="font-weight:bold;">未辦理移交事項：</label>
        <textarea id="logTask2" rows="3"></textarea>

        <button class="btn-primary" id="btnSaveLog" onclick="saveLog()">儲存日誌</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/duty.js"></script>
</body>
</html>
