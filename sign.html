<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>數位會簽本 - 綜合管理系統</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
  </script>
</head>
<body>
  <div class="container" id="signSystemBox">
    <button class="btn-secondary" onclick="window.location.href='menu.html'">⬅ 返回選單</button>
    <div style="margin-top:15px; margin-bottom:15px;"><h3>待簽核文件列表</h3></div>
    <div id="fileList"><p style="text-align:center;">讀取資料中...</p></div>

    <div id="previewSection" class="hidden" style="margin-top:20px;">
      <div style="margin-bottom:10px;">📄 預覽：<span id="previewNameTarget" style="color:#1a73e8; font-weight:bold;"></span></div>
      <div class="pdf-viewer-container" id="pdfContainer"></div>
    </div>
  </div>

  <div id="confirmModal" class="modal-overlay hidden">
    <div class="modal-box">
      <div style="font-weight:bold; font-size:1.2em; margin-bottom:15px;">確認簽核</div>
      <div id="modalMessage" style="color:#555; margin-bottom:20px;"></div>
      <div style="display:flex; justify-content:center; gap:10px;">
        <button class="btn-secondary" onclick="closeModal()">取消</button>
        <button class="btn-primary" onclick="executeSign()" style="width:auto;">確定簽核</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/sign.js"></script>
</body>
</html>
