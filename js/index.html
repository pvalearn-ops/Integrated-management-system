<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>登入 - 綜合管理系統</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container" id="loginBox">
    <div class="header-title">
      <div class="asso-name">中華產業機械設備協會</div>
      <div class="sub-title">綜合管理系統</div>
    </div>
    <div class="login-box">
      <input type="text" id="acc" placeholder="帳號">
      <input type="password" id="pwd" placeholder="密碼">
      <button class="btn-primary" id="loginBtn" onclick="handleLogin()">登入</button>
      <p id="loginMsg" style="color:red; margin-top:10px;"></p>
    </div>
  </div>
  
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
